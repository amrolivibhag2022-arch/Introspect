<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Introspect - Self Reflection</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/style.css">
</head>

<body>

<div class="dashboard-container">

<header class="dashboard-header">

    <div class="dashboard-logo">
        <h2>Introspect</h2>
        <span>Self Reflection</span>
    </div>

    <div class="profile-area">
        <span>Welcome, <span id="usernameDisplay">User</span></span>

        <button id="logoutBtn" class="login-submit">Logout</button>
    </div>

</header>

<div class="dashboard-layout">

    <aside class="dashboard-sidebar">
        <nav>

            <a href="user_dashboard.html">Dashboard</a>
            <a href="profile.html">Profile</a>
            <a href="reflection.html">Self Reflection</a>
            <a href="nivedan.html">Nivedan</a>
            <a href="progress.html">Progress</a>
            <a href="reports.html">Reports</a>
            <a href="settings.html">Settings</a>

        </nav>
    </aside>

    <main class="dashboard-content">

    <section class="welcome-section">
        <h1>📝 Aaj Ka Nivedan</h1>

        <p>
            Apni aaj ki seva aur swadhyay sambandhit sankshipt jankari darj karein.
        </p>
    </section>

    <section class="activity-panel">

        <form id="nivedanForm">

<div class="activity-card">

    <h2>🕊️ भावफेरी</h2>

    <label>Kya aaj Bhaavferi ki?</label>

    <div class="radio-group">

        <label>
            <input type="radio"
                   name="bhaavferi"
                   value="yes">
            Yes
        </label>

        <label>
            <input type="radio"
                   name="bhaavferi"
                   value="no">
            No
        </label>

    </div>

    <div id="bhaavferi-hours-section">

        <label for="bhaavferiHours">
            Kitne Hours?
        </label>

        <input
            type="number"
            id="bhaavferiHours"
            min="0"
            max="12"
            step="0.5"
            placeholder="Example : 2">

    </div>

    <div id="bhaavferi-reason-section">

        <label for="reason">

            Agar nahi kar sake to reason (Optional)

        </label>

        <textarea
            id="reason"
            rows="3"
            placeholder="Optional"></textarea>

    </div>

</div>

<br>

<button
    type="submit"
    class="primary-btn">

    Save Nivedan

</button>
        </form>

    </section>

</main>

</div>

<footer class="dashboard-footer">
    <p>Introspect v0.01 MVP</p>
</footer>

</div>

<script src="../js/modules/session.js"></script>
<script src="../js/routing.js"></script>

<script src="../js/modules/activityConfig.js"></script>
<script src="../js/modules/activityRenderer.js"></script>
<script src="../js/modules/nivedanStorage.js"></script>

<script src="../js/nivedan.js"></script>

<script>

AppRouter.protectPage("user");

document.getElementById("logoutBtn").onclick = function () {
    Session.logout();
};

</script>
</body>
</html>
