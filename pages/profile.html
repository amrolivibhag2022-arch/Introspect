<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Introspect - Profile</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/style.css">
</head>

<body>

<div class="dashboard-container">

<header class="dashboard-header">

    <div class="dashboard-logo">
        <h2>Introspect</h2>
        <span>User Profile</span>
    </div>

    <div class="profile-area">
        <span>Welcome, <span id="usernameDisplay">User</span> | <span id="roleDisplay">User</span></span>

        <button id="logoutBtn" class="login-submit">Logout</button>
    </div>

</header>

<div class="dashboard-layout">

    <aside class="dashboard-sidebar">
        <nav>

            <a href="user_dashboard.html">Dashboard</a>
            <a href="profile.html">Profile</a>
            <a href="reflection.html">Self Reflection</a>
            <a href="progress.html">Progress</a>
            <a href="reports.html">
Reports
</a>
            <a href="settings.html">Settings</a>

        </nav>
    </aside>

    <main class="dashboard-content">

        <section class="welcome-section">
            <h1>My Profile 👤</h1>
            <p>Manage your personal information and growth identity.</p>
        </section>

        <section class="dashboard-card profile-card">

            <h3>Personal Information</h3>

            <div class="input-group">
                <label>Username</label>
                <input type="text" id="username" readonly>
            </div>

            <div class="input-group">
                <label>Role</label>
                <input type="text" id="role" readonly>
            </div>

            <div class="input-group">
                <label>Name</label>
                <input type="text" id="name" placeholder="Enter your name">
            </div>

            <div class="input-group">
                <label>Email</label>
                <input type="email" id="email" placeholder="Enter your email">
            </div>

            <div class="input-group">
                <label>Bio</label>
                <textarea id="bio" rows="5" placeholder="Write something about yourself"></textarea>
            </div>

            <div class="input-group">
                <label>Personal Goals</label>
                <textarea id="goals" rows="5" placeholder="Describe your personal goals"></textarea>
            </div>

            <button id="saveProfileBtn" class="login-submit">
                Save Profile
            </button>

        </section>

    </main>

</div>

<footer class="dashboard-footer">
    <p>Introspect v0.01</p>
</footer>

</div>

<script src="../js/modules/session.js"></script>
<script src="../js/routing.js"></script>
<script src="../js/profile.js"></script>

<script>

AppRouter.protectPage("user");

document.getElementById("logoutBtn").onclick = function () {
    Session.logout();
};

</script>

</body>
</html>
